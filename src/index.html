<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/Union.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Unicity Agent Sphere</title>
    <!-- Splash screen fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-J2S6VSBDSH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-J2S6VSBDSH');
    </script>
    <script>
      // SPA route restore — GitHub Pages 404.html redirects here with ?p=/route
      // e.g. /sphere/branch/?p=%2Fhome → /sphere/branch/home
      (function() {
        var p = new URLSearchParams(window.location.search).get('p');
        if (p) {
          var base = window.location.pathname.replace(/\/$/, '');
          window.history.replaceState(null, '', base + p + window.location.hash);
        }
      })();
    </script>
    <script>
      // Prevent FOUC by applying theme before React loads
      (function() {
        const stored = localStorage.getItem('sphere-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = stored || (prefersDark ? 'dark' : 'light');
        document.documentElement.classList.add(theme);
      })();
    </script>
  </head>
  <body style="margin: 0;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
