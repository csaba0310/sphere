name: Build and Push Docker Image

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # No build-args: the image is environment-AGNOSTIC. The Dockerfile
          # bakes __RUNTIME_*__ placeholders (its ARG defaults); the real
          # per-env public config (SPHERE_API_URL, WALLET_API_URL, ...) is
          # injected at container start by deploy/runtime-config.sh from the
          # ECS task definition's env vars. This is what lets the SAME image
          # auto-deploy to staging and be promoted, unchanged, to prod.

      # Auto-deploy the just-published image to AWS staging. Fires a
      # repository_dispatch into sphere-infra, whose deploy-sphere-site-staging
      # workflow listens for `sphere-site-image-published` and rolls the ECS
      # service to client_payload.image_tag. Runs only after a successful
      # push on main (implicit success() + the ref guard).
      - name: Trigger staging deploy (sphere-infra)
        if: github.ref == 'refs/heads/main'
        env:
          # GITHUB_TOKEN can't dispatch cross-repo; DEPLOY_DISPATCH_TOKEN is the
          # same token wallet-api uses (Contents:write on sphere-infra).
          GH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
        run: |
          TAG="sha-${GITHUB_SHA:0:7}"
          gh api repos/unicity-sphere/sphere-infra/dispatches --method POST --input - <<EOF
          {"event_type":"sphere-site-image-published","client_payload":{"image_tag":"$TAG","sha":"${{ github.sha }}"}}
          EOF
          echo "Dispatched sphere-site-image-published (image_tag=$TAG) to sphere-infra"
